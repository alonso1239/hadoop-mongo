networks:
  gamestore-net:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode:
  mongodb_data:

services:

  # ── HADOOP HDFS ────────────────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: gamestore-namenode
    restart: always
    ports:
      - "19870:9870"  # Web UI HDFS (19870 externo → 9870 interno)
      - "19000:9000"  # RPC HDFS  (19000 externo → 9000 interno)
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data
    environment:
      - CLUSTER_NAME=gamestore
    env_file:
      - ./hadoop/hadoop.env
    networks:
      - gamestore-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: gamestore-datanode
    restart: always
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    env_file:
      - ./hadoop/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    networks:
      - gamestore-net

  # ── APACHE SPARK ───────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: gamestore-spark-master
    user: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080"   # Spark Master UI
      - "7077:7077"   # Spark RPC
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
    networks:
      - gamestore-net

  spark-worker:
    image: apache/spark:3.5.3
    container_name: gamestore-spark-worker
    user: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=2
    ports:
      - "8081:8081"   # Spark Worker UI
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
    depends_on:
      - spark-master
    networks:
      - gamestore-net

  # ── MONGODB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: gamestore-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js
    environment:
      MONGO_INITDB_DATABASE: gamestore_db
    networks:
      - gamestore-net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: gamestore-mongo-express
    restart: always
    ports:
      - "8082:8081"   # Mongo Express UI
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - gamestore-net
